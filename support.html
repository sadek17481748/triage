    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triage-Support</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/support.css">
</head>
<body> 
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
          <!-- Logo / Brand -->
          <a class="navbar-brand" href="#" style="color: red; font-weight: bold;">Triage</a>
          <!-- Toggler for mobile view -->
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <!-- Nav links -->
          <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
            <ul class="navbar-nav mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="index.html" style="color: black;">Logout</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>  
      <div class="container my-4">
        <h2 class="mb-4 text-center">Support Dashboard</h2>
        
        <!-- Search Feature -->
        <div class="mb-4">
          <h5>Search Accounts or Issues</h5>
          <form class="d-flex" role="search">
            <input class="form-control me-2" type="search" placeholder="Search by name, DOB, Employee ID, Ticket #" aria-label="Search" />
            <button class="btn btn-primary" type="submit">Search</button>
          </form>
        </div>
      
        <!-- Tickets List -->
        <div>
          <h5>Latest Tickets</h5>
          <!-- Placeholder Ticket -->
          <div class="border p-3 mb-3">
            <div class="d-flex justify-content-between mb-2">
              <div>
                <strong>Date:</strong> 2024-04-27 14:30<br />
                <strong>Summary:</strong> Placeholder issue summary goes here.
              </div>
              <div>
                <button class="btn btn-sm btn-secondary me-2">Account</button>
                <button class="btn btn-sm btn-warning me-2">Escalate</button>
                <button class="btn btn-sm btn-danger">Complete</button>
              </div>
            </div>
            <div>
              <strong>Description:</strong> Brief description of the issue or problem.
            </div>
          </div>
          <!-- Repeat more tickets as needed -->
        </div>
      
        <!-- Raise Ticket Option -->
        <div class="mt-5">
          <h5>If you are a non-account holder or during downtime, create a temporary ticket</h5>
          <button class="btn btn-primary" id="createTicketBtn">Create Ticket</button>
        </div>
      </div>
      
    

   
    <!-- Bootstrap JS (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
