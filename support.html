<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Support Page</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
<!-- Custom CSS (optional) -->
<link rel="stylesheet" href="assets/css/support.css" />
</head>
<body>

<!-- Optional Navbar can be added here -->

<div class="container my-4">
  <h2 class="mb-4 text-center">Support Dashboard</h2>
  
  <!-- Search Feature -->
  <div class="mb-4">
    <h5>Search Accounts or Issues</h5>
    <form class="d-flex" role="search">
      <input class="form-control me-2" type="search" placeholder="Search by name, DOB, Employee ID, Ticket #" aria-label="Search" />
      <button class="btn btn-primary" type="submit">Search</button>
    </form>
  </div>

  <!-- Tickets List -->
  <div>
    <h5>Latest Tickets</h5>
    <!-- Placeholder Ticket -->
    <div class="border p-3 mb-3">
      <div class="d-flex justify-content-between mb-2">
        <div>
          <strong>Date:</strong> 2024-04-27 14:30<br />
          <strong>Summary:</strong> Placeholder issue summary goes here.
        </div>
        <div>
          <button class="btn btn-sm btn-secondary me-2">Account</button>
          <button class="btn btn-sm btn-warning me-2">Escalate</button>
          <button class="btn btn-sm btn-danger">Complete</button>
        </div>
      </div>
      <div>
        <strong>Description:</strong> Brief description of the issue or problem.
      </div>
    </div>
    <!-- You can add more tickets here -->
  </div>

  <!-- Raise Ticket Option -->
  <div class="mt-5">
    <h5>If you are a non-account holder or during downtime, create a temporary ticket</h5>
    <!-- Button to trigger modal -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createTicketModal">Create Ticket</button>
  </div>
</div>

<!-- Create Ticket Modal -->
<div class="modal fade" id="createTicketModal" tabindex="-1" aria-labelledby="createTicketLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="createTicketLabel">Create a New Ticket</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="ticketForm">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" required>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
          </div>
          <div class="mb-3">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" class="form-control" id="dob" required>
          </div>
          <div class="mb-3">
            <label for="employeeId" class="form-label">Employee ID</label>
            <input type="text" class="form-control" id="employeeId" required>
          </div>
          <div class="mb-3">
            <label for="issue" class="form-label">Issue</label>
            <textarea class="form-control" id="issue" rows="3" required></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-primary" form="ticketForm">Create Ticket</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Optional: Add custom JS if needed -->
<script>
  document.getElementById('ticketForm').addEventListener('submit', function(e) {
    e.preventDefault();
    // You can add JS here to handle form submission, e.g., send data to server
    alert('Ticket created! (Implement form handling)');
    // Close modal after submission
    var modal = bootstrap.Modal.getInstance(document.getElementById('createTicketModal'));
    modal.hide();
  });
</script>
</body>
</html>
