<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triage-Create a new acccount</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/create.css">
</head>
<body> 
    <div class="create-container">
        <h2>Create Your Account</h2>
        <form>
            <!-- First and Last Name -->
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required />
            </div>
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required />
            </div>

            <!-- Date of Birth -->
            <div class="form-group">
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob" required />
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" />
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required />
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required />
            </div>

            <!-- Repeat Password -->
            <div class="form-group">
                <label for="repeatPassword">Repeat Password:</label>
                <input type="password" id="repeatPassword" name="repeatPassword" required />
            </div>

            <!-- Security Question -->
            <div class="form-group">
                <label for="securityQuestion">Security Question:</label>
                <select id="securityQuestion" name="securityQuestion" required>
                    <option value="">Select a question</option>
                    <option value="pet">What is your pet's name?</option>
                    <option value="mother">Mother's maiden name?</option>
                    <option value="school">Name of your first school?</option>
                </select>
            </div>

            <!-- Security Answer -->
            <div class="form-group">
                <label for="securityAnswer">Answer:</label>
                <input type="text" id="securityAnswer" name="securityAnswer" required />
            </div>

            <!-- Employee ID (Optional) -->
            <div class="form-group">
                <label for="employeeId">Employee ID (Optional):</label>
                <input type="text" id="employeeId" name="employeeId" />
            </div>

            <!-- Additional info (Optional) -->
            <div class="form-group">
                <label for="additionalInfo">Additional Information (Optional):</label>
                <textarea id="additionalInfo" name="additionalInfo" rows="3"></textarea>
            </div>

            <!-- Submit Button -->
            <div class="form-group">
                <button type="submit">Create Account</button>
            </div>
        </form>
    </div>
    
    <!-- Bootstrap JS (optional, for interactive components) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
